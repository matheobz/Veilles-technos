name: Veille IA -> Notion

on:
  schedule:
    - cron: "0 22 * * *"   # 22:00 UTC = 00:00 Paris (heure d'été) / 23:00 hiver
  workflow_dispatch:
    inputs:
      per_day:
        description: "Nombre de veilles à récupérer"
        required: false
        default: "2"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python watch.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          FEEDS: ${{ secrets.FEEDS }}
          PER_DAY: ${{ github.event.inputs.per_day || '2' }}
